<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-200 text-slate-900">
    <main class="flex min-h-screen items-center justify-center px-6 py-12">
        <section
            class="w-full max-w-xl rounded-[28px] bg-[#fff799] p-8 shadow-[0_18px_40px_rgba(15,23,42,0.18)] border border-yellow-200">
            <div class="mb-8">
                <p class="text-sm uppercase tracking-[0.22em] text-slate-500">Welcome back</p>
                <h1 class="mt-2 text-4xl font-black tracking-tight text-slate-900">Log in</h1>
                <p class="mt-2 text-base text-slate-600">
                    Access your sticky tasks and manage your notes in one place.
                </p>
            </div>
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            <form method="post" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-800">
                        Username
                    </label>
                    <input id="username" name="username" type="text" required placeholder="Enter your username"
                        class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-300">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-800">
                        Password
                    </label>
                    <input id="password" name="password" type="password" required placeholder="Enter your password"
                        class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-slate-400 focus:ring-2 focus:ring-slate-300">
                </div>

                <button type="submit"
                    class="w-full rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                    Log in
                </button>
            </form>

            <p class="mt-6 text-sm text-slate-600">
                Don’t have an account?
                <a href="{{ url_for('register') }}" class="font-semibold text-slate-900 underline underline-offset-4">
                    Create one
                </a>
            </p>
        </section>
    </main>
</body>

</html>
